{{- $title := .Title -}}
{{- $desc := .Params.og_description | default (.Params.summary | truncate 80) -}}
{{- $date := .Date.Format "January 2, 2006" -}}
{{- $hot := .Params.hot -}}
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0a0c14"/>
<stop offset="50%" stop-color="#0d0a1a"/>
<stop offset="100%" stop-color="#100a14"/>
</linearGradient>
<linearGradient id="gline" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="transparent"/>
<stop offset="25%" stop-color="rgba(157,125,234,0.7)"/>
<stop offset="75%" stop-color="rgba(157,125,234,0.7)"/>
<stop offset="100%" stop-color="transparent"/>
</linearGradient>
<filter id="tg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<rect x="0" y="0" width="1200" height="3" fill="url(#gline)"/>
<text x="72" y="82" font-family="Fira Code,monospace" font-size="18" fill="rgba(157,125,234,0.55)" font-weight="700" letter-spacing="4">// BluRRedSec</text>
<text x="72" y="210" font-family="Fira Code,monospace" font-size="48" fill="#e8e0d8" font-weight="700" letter-spacing="-1">{{ $title | truncate 40 }}</text>
{{ if $desc }}<text x="72" y="272" font-family="Fira Code,monospace" font-size="22" fill="rgba(232,224,216,0.45)" font-weight="400">{{ $desc | truncate 70 }}</text>{{ end }}
{{ partial "og-tags.html" . }}
{{ if $hot }}<rect x="{{ if .Params.explore }}{{ mul (len .Params.explore | default 0) 108 | add 82 }}{{ else }}72{{ end }}" y="370" width="68" height="34" rx="3" fill="#ff0b55"/><text x="{{ if .Params.explore }}{{ mul (len .Params.explore | default 0) 108 | add 116 }}{{ else }}106{{ end }}" y="392" font-family="monospace" font-size="12" fill="#fff" font-weight="700" text-anchor="middle">HOT</text>{{ end }}
<rect x="0" y="580" width="1200" height="50" fill="rgba(157,125,234,0.06)"/>
<rect x="0" y="580" width="1200" height="1" fill="url(#gline)"/>
<text x="72" y="611" font-family="monospace" font-size="14" fill="rgba(157,125,234,0.4)" letter-spacing="1">{{ $date }}</text>
<text x="1128" y="611" font-family="monospace" font-size="14" fill="rgba(157,125,234,0.4)" text-anchor="end" letter-spacing="1">mo2men1ee7.github.io</text>
</svg>
