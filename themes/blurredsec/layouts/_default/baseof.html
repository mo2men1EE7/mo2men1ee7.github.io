<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default `en` }}" data-theme="dark" data-glass="off">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" sizes="48x48" href="/favicon-48.png"/>
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}"/>
<!-- Restore theme/glass BEFORE CSS paints — prevents flash and ensures correct profile pic on load -->
<script>
(function(){
  try {
    var t = localStorage.getItem('brs-theme');
    var g = localStorage.getItem('brs-glass');
    if (t) document.documentElement.setAttribute('data-theme', t);
    if (g) document.documentElement.setAttribute('data-glass', g);
  } catch(e) {}
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
{{ $css := resources.Get "css/main.css" | fingerprint }}
{{ if $css }}<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">{{ end }}
<style>
/* Critical layout — inline so cache can never break it.
   This block is the WINNING stylesheet (it appears after the linked CSS in the document).
   Every card-chain element MUST have an explicit width:100% here — without it, browsers
   can resolve percentage widths against the intrinsic (min-content) size of a nested
   grid item rather than the track size, causing short-title cards to appear narrow. */
.home-content-wrap { display:grid !important; grid-template-columns:1fr !important; width:100% !important; }
.post-entry { display:grid !important; grid-template-columns:1fr !important; width:100% !important; min-width:0 !important; margin-bottom:10px !important; overflow:visible !important; align-self:stretch !important; justify-self:stretch !important; }
.entry-link-wrapper { display:block !important; width:100% !important; min-width:0 !important; text-decoration:none !important; color:inherit !important; position:relative !important; }
.modern-hover-box { width:100% !important; min-width:0 !important; box-sizing:border-box !important; height:62px !important; min-height:62px !important; max-height:62px !important; display:flex !important; align-items:center !important; justify-content:space-between !important; overflow:hidden !important; }
.title-left-group { flex:1 1 0 !important; min-width:0 !important; overflow:visible !important; display:flex !important; align-items:center !important; gap:8px !important; }
.modern-title { flex:1 1 0 !important; min-width:0 !important; white-space:nowrap !important; overflow:hidden !important; text-overflow:ellipsis !important; }
.right-group { flex-shrink:0 !important; display:flex !important; align-items:center !important; gap:6px !important; justify-content:flex-end !important; margin-left:14px !important; }
.profile-pic { width:164px !important; height:164px !important; border-radius:50% !important; object-fit:cover !important; display:block !important; }
.profile-image-side { flex-shrink:0; width:164px; height:164px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body class="site-body">

{{- partial "sidebar.html" . }}
{{- partial "header.html" . }}

<main class="main{{ if not .IsPage }} no-toc{{ end }}">
  {{- block "main" . }}{{- end }}
</main>

{{- partial "footer.html" . }}

<button id="scroll-to-top" aria-label="Back to top" style="display:none">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  <span>SCROLL UP</span>
  <span class="ping-ring ping-ring-1"></span>
  <span class="ping-ring ping-ring-2"></span>
  <span class="ping-ring ping-ring-3"></span>
</button>

{{ $js := resources.Get "js/main.js" | fingerprint }}
{{ if $js }}<script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>{{ end }}

<!-- ═══════════════════════════════════════
     CLIPPY
     ═══════════════════════════════════════ -->
<div id="clippy-wrap">
  <div id="clippy-bubble">
    <div id="clippy-text"></div>
    <div id="clippy-btns">
      <button id="clippy-yes">Yes!</button>
      <button id="clippy-no">Nah</button>
    </div>
  </div>
  <img id="clippy-img" src="{{ "/images/clippy.png" | relURL }}" alt="Clippy" draggable="false"/>
</div>

<script>
(function(){
  /* 7-day cooldown */
  var _cd = localStorage.getItem('clippy_done');
  if (_cd && Date.now() - parseInt(_cd) < 7*24*60*60*1000) return;

  /* Once buttons showed this session, re-show with buttons on every page */
  var _ready = sessionStorage.getItem('clippy_ready') === '1';

  if (_ready) {
    /* skip timer — show immediately with buttons */
    window.addEventListener('DOMContentLoaded', function(){ showClipper(true); });
  } else {
    /* first time — wait 5s */
    var timer = setTimeout(function(){
      if (document.documentElement.getAttribute('data-glass') === 'on') return;
      showClipper(false);
    }, 5000);

    var obs = new MutationObserver(function(){
      if (document.documentElement.getAttribute('data-glass') === 'on') {
        clearTimeout(timer);
        obs.disconnect();
      }
    });
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-glass'] });
  }

  /* ── Audio ── */
  var AudioCtx = window.AudioContext || window.webkitAudioContext;
  var _actx = null;
  function getCtx() {
    if (!AudioCtx) return null;
    if (!_actx) _actx = new AudioCtx();
    if (_actx.state === 'suspended') _actx.resume();
    return _actx;
  }
  ['mousemove','keydown','touchstart','scroll','click'].forEach(function(e){
    document.addEventListener(e, function(){ getCtx(); }, { once: true, passive: true });
  });

  function playSoft() {
    var ctx = getCtx(); if (!ctx) return;
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    var t = ctx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.08, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.6);
    o.start(t); o.stop(t+0.65);
  }

  function playNotify() {
    var ctx = getCtx(); if (!ctx) return;
    [523,659,784].forEach(function(freq, i){
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      var t = ctx.currentTime + i*0.12;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.18,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t); o.stop(t+0.3);
    });
  }

  function playShutdown() {
    var ctx = getCtx(); if (!ctx) return;
    [[523,659,784],[440,554,659],[349,440,523],[294,370,440]].forEach(function(chord,ci){
      chord.forEach(function(freq){
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = freq;
        var t = ctx.currentTime + ci*0.22;
        g.gain.setValueAtTime(0.12,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        o.start(t); o.stop(t+0.38);
      });
    });
  }

  function typeText(el, text, cb) {
    el.textContent = '';
    var i = 0;
    var iv = setInterval(function(){
      el.textContent += text[i++];
      if (i >= text.length) { clearInterval(iv); if (cb) cb(); }
    }, 28);
  }

  function popOut(wrap, cb) {
    wrap.style.transition = 'none';
    wrap.style.animation  = 'none';
    wrap.offsetHeight;
    var start = null, dur = 600;
    (function step(ts){
      if (!start) start = ts;
      var p    = Math.min((ts-start)/dur, 1);
      var ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      wrap.style.transform = 'translateY('+(-ease*180)+'px) rotate('+(ease*720)+'deg) scale('+(1-ease*0.95)+')';
      wrap.style.opacity   = p < 0.3 ? 1 : 1-((p-0.3)/0.7);
      if (p < 1) requestAnimationFrame(step);
      else if (cb) cb();
    })(performance.now());
  }

  function done() {
    sessionStorage.removeItem('clippy_ready');
    localStorage.setItem('clippy_done', Date.now());
  }

  function bsodFlash(wrap) {
    var dlg = document.createElement('div');
    dlg.id = 'clippy-error-dlg';
    dlg.innerHTML = [
      '<div class="ced-titlebar">',
      '  <span class="ced-title">Clippit.exe — Unemployed Since 2007</span>',
      '  <button class="ced-close" id="ced-close-btn">&#x2715;</button>',
      '</div>',
      '<div class="ced-body">',
      '  <img src="{{ "/images/clippy-info.svg" | relURL }}" class="ced-xp-icon-img" alt="info"/>',
      '  <div class="ced-msg">Task failed successfully.</div>',
      '</div>',
      '<div class="ced-footer">',
      '  <button class="ced-btn-ok" id="ced-ok">OK</button>',
      '</div>'
    ].join('');
    document.body.appendChild(dlg);
    dlg.offsetHeight;
    dlg.classList.add('ced-in');
    setTimeout(playShutdown, 120);
    /* shake */
    var gc = 0, giv = setInterval(function(){
      gc++;
      dlg.style.transform = gc%2===0
        ? 'translate(-50%,-50%) translateX('+((Math.random()-0.5)*6)+'px)'
        : 'translate(-50%,-50%)';
      if (gc > 6) { clearInterval(giv); dlg.style.transform = 'translate(-50%,-50%)'; }
    }, 80);
    function dismiss() {
      dlg.classList.add('ced-out');
      setTimeout(function(){
        dlg.remove();
        if (wrap) popOut(wrap, function(){ wrap.remove(); });
      }, 350);
    }
    setTimeout(function(){
      var ok  = document.getElementById('ced-ok');
      var cls = document.getElementById('ced-close-btn');
      if (cls) cls.addEventListener('click', dismiss);
      if (ok)  ok.addEventListener('click', dismiss);
      setTimeout(dismiss, 4000);
    }, 100);
  }

  function showClipper(instant) {
    if (typeof obs !== 'undefined') { try { obs.disconnect(); } catch(e){} }

    var wrap   = document.getElementById('clippy-wrap');
    var bubble = document.getElementById('clippy-bubble');
    var txtEl  = document.getElementById('clippy-text');
    var btns   = document.getElementById('clippy-btns');
    var yesBtn = document.getElementById('clippy-yes');
    var noBtn  = document.getElementById('clippy-no');
    if (!wrap) return;

    wrap.classList.add('clippy-in');
    if (typeof startClippyFloat === 'function') startClippyFloat();

    if (instant) {
      /* already saw him — restore to buttons stage silently */
      bubble.classList.add('clippy-bubble-in');
      txtEl.textContent = "It looks like you're browsing in normal mode. Would you like to try Glass Mode?";
      btns.classList.add('clippy-btns-show');
    } else {
      playSoft();
      setTimeout(function(){
        bubble.classList.add('clippy-bubble-in');
        typeText(txtEl, "It looks like you're browsing in normal mode. Would you like to try Glass Mode?", function(){
          btns.classList.add('clippy-btns-show');
          sessionStorage.setItem('clippy_ready', '1'); /* now persist across pages */
        });
      }, 600);
    }

    yesBtn.addEventListener('click', function(){
      sessionStorage.removeItem('clippy_ready');
      btns.style.display = 'none';
      playNotify();
      typeText(txtEl, "Hey, maybe do it yourself? Im not your LLM minion on payroll xd.. Dang! maybe just look up a bit, you lazy lil script kiddie.. :-)", function(){
        setTimeout(function(){
          done();
          /* shake Clippy then show error */
          var shakes = 0;
          wrap.style.transition = 'none';
          var shakeIv = setInterval(function(){
            shakes++;
            wrap.style.transform = 'translate('+((Math.random()-0.5)*18)+'px,'+((Math.random()-0.5)*8)+'px)';
            if (shakes >= 16) {
              clearInterval(shakeIv);
              wrap.style.transform = '';
              bsodFlash(wrap);
            }
          }, 45);
        }, 3900);
      });
    });

    noBtn.addEventListener('click', function(){
      done();
      popOut(wrap, function(){ wrap.remove(); });
    });
  }

})();
</script>

<script>
/* ── Clippy New-Content Notifier ── */
(function() {
  var POLL_INTERVAL = 5 * 60 * 1000; /* 5 minutes */
  var VERSION_URL   = '{{ "/" | absURL }}index.json';
  var STORAGE_KEY   = 'brs-build-time';
  var SHOWN_KEY     = 'brs-update-shown';

  /* Read build time baked into this page load */
  var pageBuildTime = {{ now.Unix }};

  /* Store on first visit */
  var stored = null;
  try { stored = localStorage.getItem(STORAGE_KEY); } catch(e) {}
  if (!stored) {
    try { localStorage.setItem(STORAGE_KEY, pageBuildTime); } catch(e) {}
    return; /* first visit — nothing to compare yet */
  }

  function showUpdateClipper() {
    /* Don't stack with the existing Clippy flow */
    var existing = document.getElementById('clippy-wrap');
    if (existing && existing.classList.contains('clippy-in')) return;
    /* Don't re-show if already shown this session */
    try { if (sessionStorage.getItem(SHOWN_KEY) === '1') return; } catch(e) {}

    var wrap   = existing || document.getElementById('clippy-wrap');
    if (!wrap) return;

    /* Cancel any ongoing animation */
    wrap.style.animation = 'none';
    wrap.style.transition = 'none';
    wrap.offsetHeight;

    var bubble = document.getElementById('clippy-bubble');
    var txtEl  = document.getElementById('clippy-text');
    var btns   = document.getElementById('clippy-btns');
    var yesBtn = document.getElementById('clippy-yes');
    var noBtn  = document.getElementById('clippy-no');
    if (!bubble || !txtEl || !btns) return;

    /* Override button labels for this context */
    yesBtn.textContent = 'Alright!';
    noBtn.textContent  = 'Later';

    /* Reset state */
    bubble.classList.remove('clippy-bubble-in');
    btns.classList.remove('clippy-btns-show');
    txtEl.textContent = '';
    wrap.style.opacity   = '';
    wrap.style.transform = '';

    wrap.classList.add('clippy-in');
    if (typeof startClippyFloat === 'function') startClippyFloat();

    setTimeout(function() {
      bubble.classList.add('clippy-bubble-in');
      typeClipper(txtEl, "It looks like there's new content! Want to refresh to see it?", function() {
        btns.classList.add('clippy-btns-show');
        try { sessionStorage.setItem(SHOWN_KEY, '1'); } catch(e) {}
      });
    }, 600);

    /* One-time listeners — remove old ones by cloning */
    var newYes = yesBtn.cloneNode(true);
    var newNo  = noBtn.cloneNode(true);
    yesBtn.parentNode.replaceChild(newYes, yesBtn);
    noBtn.parentNode.replaceChild(newNo, noBtn);

    newYes.addEventListener('click', function() {
      try { localStorage.setItem(STORAGE_KEY, pageBuildTime); } catch(e) {}
      try { sessionStorage.removeItem(SHOWN_KEY); } catch(e) {}
      location.reload();
    });
    newNo.addEventListener('click', function() {
      try { localStorage.setItem(STORAGE_KEY, pageBuildTime); } catch(e) {}
      wrap.style.animation = 'none';
      wrap.style.transition = 'none';
      wrap.offsetHeight;
      var start = null; var dur = 500;
      (function step(ts) {
        if (!start) start = ts;
        var p = Math.min((ts - start) / dur, 1);
        wrap.style.opacity   = 1 - p;
        wrap.style.transform = 'translateY(' + (-p * 40) + 'px)';
        if (p < 1) { requestAnimationFrame(step); }
        else { wrap.classList.remove('clippy-in'); wrap.style.opacity = ''; wrap.style.transform = ''; }
      })(performance.now());
    });
  }

  function typeClipper(el, text, cb) {
    el.textContent = '';
    var i = 0;
    var iv = setInterval(function() {
      el.textContent += text[i++];
      if (i >= text.length) { clearInterval(iv); if (cb) cb(); }
    }, 28);
  }

  function checkForUpdate() {
    fetch(VERSION_URL + '?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var latest = data.buildTime;
        var prev   = null;
        try { prev = parseInt(localStorage.getItem(STORAGE_KEY)); } catch(e) {}
        if (prev && latest && latest > prev) {
          showUpdateClipper();
        }
      })
      .catch(function() {}); /* silently fail if offline */
  }

  /* Start polling after 1 min delay (let page settle) then every 5 min */
  setTimeout(function() {
    checkForUpdate();
    setInterval(checkForUpdate, POLL_INTERVAL);
  }, 60 * 1000);

})();
</script>
